<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="advg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Compass ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="url(#advg)" stroke-width="4"/>
  <!-- N arrow (north, red) -->
  <polygon points="32,10 28,32 36,32" fill="#ef4444"/>
  <!-- S arrow (south, green) -->
  <polygon points="32,54 36,32 28,32" fill="#34d399"/>
  <!-- Center hub -->
  <circle cx="32" cy="32" r="4" fill="#059669"/>
  <!-- Cardinal ticks -->
  <rect x="30.5" y="6"  width="3" height="5" rx="1.5" fill="#34d399"/>
  <rect x="30.5" y="53" width="3" height="5" rx="1.5" fill="#34d399"/>
  <rect x="6"  y="30.5" width="5" height="3" rx="1.5" fill="#34d399"/>
  <rect x="53" y="30.5" width="5" height="3" rx="1.5" fill="#34d399"/>
